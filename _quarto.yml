  appendices:
    - href: notebooks/plot_japan_climate_map.qmd
      text: "Plot Japan Climate Map"
    - href: index_ja.qmd
      text: "日本語版: はじめに"
    - href: notebooks/prepare_climate_data_ja.qmd
      text: "日本語版: 気候データの準備"
    - href: notebooks/calculate_PET_ja.qmd
